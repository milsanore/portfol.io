apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portfolio.fullname" . }}-config
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  PORT: {{ .Values.env.PORT | quote }}
  HOST: {{ .Values.env.HOST | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  ENABLE_RESPONSE_VALIDATION: {{ .Values.env.ENABLE_RESPONSE_VALIDATION | quote }}
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
