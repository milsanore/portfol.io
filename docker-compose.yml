services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
