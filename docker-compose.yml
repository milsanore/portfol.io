services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 150M
        reservations:
          cpus: "1.5"
          memory: 150M
    healthcheck:
      test: [
        "CMD", "node", "-e", 
        "require('http').get('http://localhost:3000/hello', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
