# Reusable CI workflow — called by feature.yml and pr.yml.
# Note: GitHub Actions requires workflows to live in .github/workflows/;
# deployment/github/ cannot be used as a source directory.
name: CI

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --coverage

      - name: Cache postgres image
        id: cache-postgres
        uses: actions/cache@v4
        with:
          path: /tmp/postgres.tar
          key: postgres-18.3

      - name: Pull and save postgres image
        if: steps.cache-postgres.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:18.3
          docker save postgres:18.3 -o /tmp/postgres.tar

      - name: Load postgres image
        if: steps.cache-postgres.outputs.cache-hit == 'true'
        run: docker load -i /tmp/postgres.tar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: portfolio-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: |
          docker compose -p portfolio up -d --wait
          npm run migrate:up
          npm run import:tick-data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio

      - name: Integration tests
        run: npm run test:integration

      - name: Load tests
        run: |
          docker run --rm \
            --network host \
            --cpus="1.5" \
            --memory="150m" \
            -v "${{ github.workspace }}/tests_load:/tests" \
            --entrypoint sh \
            grafana/k6 /tests/run.sh

      - name: Stop services
        if: always()
        run: docker compose -p portfolio down
